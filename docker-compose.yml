version: "3.9"

services:
  api:
    image: llmopspro/compliancegxp:latest
    container_name: compliancegxp
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # persistent storage: FAISS indices + audit logs
      - ./docs:/app/docs        # drop your PDFs/DOCX here before ingesting
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
